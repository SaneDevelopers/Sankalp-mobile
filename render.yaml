services:
  - type: web
    name: sankalp-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: echo "Using pre-built dist"
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false



