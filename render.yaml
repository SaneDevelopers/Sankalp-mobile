services:
  - type: web
    name: sankalp-api
    runtime: node
    region: singapore  # closest to India
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false  # you'll set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
